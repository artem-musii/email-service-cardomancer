services:
  app:
    build: .
    environment:
      - DATABASE_URL
      - RABBITMQ_URL
      - RESEND_API_KEY
      - FROM_EMAIL
      - PORT
      - LOG_LEVEL
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
